services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: screener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d screener"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "-l", "INFO"]

  beat:
    build: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "-l", "INFO"]

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env.example
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
